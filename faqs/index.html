<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>FAQs</title>

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  display:flex;
  gap:25px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(12px);
  border-radius:20px;
  padding:25px;
  width:200px;
  text-align:center;
  cursor:pointer;
  transition:0.25s;
  box-shadow:0 10px 25px rgba(0,0,0,0.3);
  color:white;
}

/* Hover */
.card:hover{
  transform:translateY(-8px) scale(1.04);
  box-shadow:0 15px 35px rgba(0,0,0,0.5);
}

/* Click effect */
.card:active{
  transform:scale(0.97);
}

/* Titolo */
.card h2{
  margin:0;
  font-size:1.4rem;
}

/* Testo */
.card p{
  margin-top:10px;
  font-size:.95rem;
  opacity:.9;
}
</style>
</head>
<body>

<div class="container">

<div class="card" onclick="openPage('presentazione')">
<h2>Presentazione</h2>
<p>Cose da sapere</p>
</div>

</div>

<script>
function openPage(page){
  window.location.href = `demenigeco.github.io/faq/${page}/`
}
</script>

</body>
</html>
