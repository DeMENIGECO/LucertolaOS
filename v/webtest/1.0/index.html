<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>LucertolaOS</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- DESKTOP -->
<div id="desktop"></div>

<!-- DOCK -->
<div class="dock">

<!-- TERMINALE -->
<button onclick="openApp('Apps/terminal.html')">
<svg viewBox="0 0 24 24">
<rect x="2" y="4" width="20" height="16" rx="2"/>
<path d="M6 9l3 3-3 3"/>
<line x1="11" y1="15" x2="16" y2="15"/>
</svg>
</button>

<!-- BROWSER -->
<button onclick="openApp('Apps/browser.html')">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<line x1="3" y1="12" x2="21" y2="12"/>
</svg>
</button>

<!-- IMPOSTAZIONI -->
<button onclick="openApp('Apps/settings.html')">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="3"/>
<path d="M19 12l2-1-2-1-1-2-2 1-2-1-1-2-1 2-2 1-2-1-1 2-2 1 2 1 1 2 2-1 2 1 1 2 1-2 2-1 2 1 1-2z"/>
</svg>
</button>

<!-- CALCOLATRICE -->
<button onclick="openApp('Apps/calculator.html')">
<svg viewBox="0 0 24 24">
<rect x="5" y="2" width="14" height="20" rx="2"/>
<rect x="7" y="5" width="10" height="3"/>
</svg>
</button>

<!-- NOTE -->
<button onclick="openApp('Apps/notes.html')">
<svg viewBox="0 0 24 24">
<rect x="4" y="2" width="16" height="20"/>
<line x1="7" y1="7" x2="17" y2="7"/>
<line x1="7" y1="11" x2="17" y2="11"/>
</svg>
</button>

<!-- MUSICA -->
<button onclick="openApp('Apps/music.html')">
<svg viewBox="0 0 24 24">
<circle cx="8" cy="17" r="3"/>
<circle cx="16" cy="15" r="3"/>
<rect x="11" y="4" width="2" height="10"/>
</svg>
</button>

<!-- PAINT -->
<button onclick="openApp('Apps/paint.html')">
<svg viewBox="0 0 24 24">
<path d="M12 2a10 10 0 100 20c2 0 2-2 1-3s-1-2 1-2h2a6 6 0 000-12z"/>
</svg>
</button>

<!-- FILE VIEWER -->
<button onclick="openApp('Apps/files.html')">
<svg viewBox="0 0 24 24">
<path d="M4 4h10l6 6v10H4z"/>
</svg>
</button>

<!-- OROLOGIO -->
<button onclick="openApp('Apps/clock.html')">
<svg viewBox="0 0 24 24">
<circle cx="12" cy="12" r="9"/>
<line x1="12" y1="12" x2="12" y2="7"/>
<line x1="12" y1="12" x2="16" y2="12"/>
</svg>
</button>

<!-- DADO -->
<button onclick="openApp('Apps/dice.html')">
<svg viewBox="0 0 24 24">
<rect x="4" y="4" width="16" height="16" rx="3"/>
<circle cx="9" cy="9" r="1.5"/>
<circle cx="15" cy="15" r="1.5"/>
</svg>
</button>

</div>

<!-- SYSTEM CORE -->
<script src="System/window.js"></script>

<!-- CONTROLLER -->
<script src="system.js"></script>

</body>
</html>
