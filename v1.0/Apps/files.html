<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{font-family:sans-serif;margin:0}
#bar{background:#ddd;padding:8px}
#files{padding:10px}
.item{padding:5px;cursor:pointer;border-radius:6px}
.item:hover{background:#eee}
.folder{font-weight:bold}
</style>
</head>
<body>

<div id="bar">
<button onclick="newFolder()">Nuova Cartella</button>
<button onclick="newFile()">Nuovo File</button>
<button onclick="renameItem()">Rinomina</button>
<button onclick="deleteItem()">Elimina</button>
<span id="path"></span>
</div>

<div id="files"></div>

<script>
let disk={
name:"Disco",
type:"folder",
protected:true,
children:[
{
name:"System",
type:"folder",
protected:true,
children:[
{name:"window.js",type:"file"},
]
},
{
name:"Apps",
type:"folder",
children:[
{name:"browser.html",type:"file"},
{name:"calculator.html",type:"file"},
{name:"clock.html",type:"file"}
{name:"dice.html",type:"file"}
{name:"files.html",type:"file"}
{name:"music.html",type:"file"}
{name:"notes.html",type:"file"}
{name:"paint.html",type:"file"}
{name:"settings.html",type:"file"}
{name:"terminal.html",type:"file"}
]
}
]
};

let current=disk;
let selected=null;
let history=[];

function render(){
files.innerHTML="";
path.textContent="/"+history.map(f=>f.name).join("/");

current.children?.forEach(item=>{
let div=document.createElement("div");
div.className="item "+item.type;
div.textContent=(item.type=="folder"?"📁 ":"📄 ")+item.name;

div.onclick=()=>{
selected=item;
document.querySelectorAll(".item").forEach(e=>e.style.background="");
div.style.background="#cce5ff";
};

div.ondblclick=()=>{
if(item.type=="folder"){
history.push(item);
current=item;
render();
}
};

files.appendChild(div);
});
}

function newFolder(){
let name=prompt("Nome cartella");
if(!name)return;
current.children.push({name,type:"folder",children:[]});
render();
}

function newFile(){
let name=prompt("Nome file");
if(!name)return;
current.children.push({name,type:"file"});
render();
}

function renameItem(){
if(!selected)return alert("Seleziona file");
if(selected.protected)return alert("Protetto!");

let n=prompt("Nuovo nome",selected.name);
if(n) selected.name=n;
render();
}

function deleteItem(){
if(!selected)return alert("Seleziona file");
if(selected.protected)return alert("Cartella protetta!");

current.children=current.children.filter(i=>i!==selected);
selected=null;
render();
}

document.body.onkeydown=e=>{
if(e.key==="Backspace" && history.length){
current=history.pop();
render();
}
};

render();
</script>

</body>
</html>
