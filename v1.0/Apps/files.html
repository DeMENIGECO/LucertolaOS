<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{font-family:sans-serif;margin:0;padding:0}
#bar {
  background:#ccc;
  padding:8px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}
#bar button {
  background:#fff;
  border:1px solid #999;
  padding:4px 8px;
  cursor:pointer;
  font-size:14px;
}
#bar button:hover { background:#eee; }
#files{padding:10px}
.item{padding:5px;cursor:pointer;border-radius:6px}
.item:hover{background:#eee}
.folder{font-weight:bold}
.selected{background:#cce5ff}
</style>
</head>
<body>

<div id="bar">
<button onclick="goBack()">⬅ Indietro</button>
<button onclick="newFolder()">📂 Nuova Cartella</button>
<button onclick="newFile()">📄 Nuovo File</button>
<button onclick="renameItem()">✏️ Rinomina</button>
<button onclick="deleteItem()">🗑 Elimina</button>
<span id="path" style="margin-left:10px;"></span>
</div>

<div id="files"></div>

<script>
// Funzione per creare gli oggetti con parent
function createFolder(name, parent, protectedFlag=false){
  let folder = {name, type:"folder", children:[], parent};
  if(protectedFlag) folder.protected = true;
  return folder;
}

function createFile(name, parent){
  return {name, type:"file", parent};
}

// Disco virtuale
let disk = createFolder("Disco", null, true);

let systemFolder = createFolder("System", disk, true);
systemFolder.children.push(createFile("window.js", systemFolder));

let appsFolder = createFolder("Apps", disk);
["browser.html","calculator.html","clock.html","dice.html","files.html","music.html","notes.html","paint.html","settings.html","terminal.html"]
.forEach(f => appsFolder.children.push(createFile(f, appsFolder)));

disk.children = [systemFolder, appsFolder];

let current = disk;
let selected = null;
let history = [];

// Funzione di rendering
function render(){
  const container = document.getElementById("files");
  container.innerHTML = "";
  document.getElementById("path").textContent = "/" + history.map(f=>f.name).join("/") + (history.length>0?"/":"") + current.name;

  if(!current.children || current.children.length===0){
    container.textContent="(Cartella vuota)";
    return;
  }

  current.children.forEach(item=>{
    let div = document.createElement("div");
    div.className = "item " + item.type + (item.type==="folder"?" folder":"");
    div.textContent = (item.type==="folder"?"📁 ":"📄 ") + item.name;

    div.onclick = ()=>{
      selected = item;
      document.querySelectorAll(".item").forEach(e=>e.classList.remove("selected"));
      div.classList.add("selected");
    };

    div.ondblclick = ()=>{
      if(item.type==="folder"){
        history.push(current);
        current = item;
        selected = null;
        render();
      }
    };

    container.appendChild(div);
  });
}

// Funzione protezione ricorsiva: tutto dentro System è protetto
function isProtected(item){
  if(item.protected) return true;
  let p = item.parent;
  while(p){
    if(p.name==="System" && p.type==="folder") return true;
    p = p.parent;
  }
  return false;
}

// Funzioni gestione
function newFolder(){ 
  let name = prompt("Nome cartella:"); 
  if(!name) return; 
  current.children.push(createFolder(name, current)); 
  render(); 
}

function newFile(){ 
  let name = prompt("Nome file:"); 
  if(!name) return; 
  current.children.push(createFile(name, current)); 
  render(); 
}

function renameItem(){ 
  if(!selected) return alert("Seleziona file o cartella"); 
  if(isProtected(selected)) return alert("Protetto!");
  let n = prompt("Nuovo nome:",selected.name); 
  if(n) selected.name=n; 
  render(); 
}

function deleteItem(){ 
  if(!selected) return alert("Seleziona file o cartella"); 
  if(isProtected(selected)) return alert("Protetto!");
  current.children = current.children.filter(i=>i!==selected); 
  selected=null; 
  render(); 
}

function goBack(){
  if(history.length>0){
    current = history.pop();
    selected = null;
    render();
  } else {
    alert("Sei già alla radice del disco!");
  }
}

// Torna indietro con Backspace
document.body.onkeydown = e=>{
  if(e.key==="Backspace" && history.length){
    current=history.pop();
    selected=null;
    render();
    e.preventDefault();
  }
};

// Primo render
render();
</script>

</body>
</html>
