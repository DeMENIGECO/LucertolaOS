<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{font-family:sans-serif;margin:0;padding:0}
#bar {
  background:#ccc;
  padding:8px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
}
#bar button {
  background:#fff;
  border:1px solid #999;
  padding:4px 8px;
  cursor:pointer;
  font-size:14px;
}
#bar button:hover {
  background:#eee;
}
#files{padding:10px}
.item{padding:5px;cursor:pointer;border-radius:6px}
.item:hover{background:#eee}
.folder{font-weight:bold}
.selected{background:#cce5ff}
</style>
</head>
<body>

<div id="bar">
<button onclick="goBack()">⬅ Indietro</button>
<button onclick="newFolder()">📂 Nuova Cartella</button>
<button onclick="newFile()">📄 Nuovo File</button>
<button onclick="renameItem()">✏️ Rinomina</button>
<button onclick="deleteItem()">🗑 Elimina</button>
<span id="path" style="margin-left:10px;"></span>
</div>

<div id="files"></div>

<script>
// Disco virtuale
let disk = {
  name:"Disco",
  type:"folder",
  protected:true,
  children:[
    { name:"System", type:"folder", protected:true, children:[ {name:"window.js", type:"file"} ] },
    { name:"Apps", type:"folder", children:[
        {name:"browser.html",type:"file"},
        {name:"calculator.html",type:"file"},
        {name:"clock.html",type:"file"},
        {name:"dice.html",type:"file"},
        {name:"files.html",type:"file"},
        {name:"music.html",type:"file"},
        {name:"notes.html",type:"file"},
        {name:"paint.html",type:"file"},
        {name:"settings.html",type:"file"},
        {name:"terminal.html",type:"file"}
    ] }
  ]
};

let current = disk;
let selected = null;
let history = [];

// Funzione di rendering
function render() {
  const container = document.getElementById("files");
  container.innerHTML = "";
  document.getElementById("path").textContent = "/" + history.map(f=>f.name).join("/") + (history.length>0?"/":"") + current.name;

  if(!current.children || current.children.length===0){
    container.textContent="(Cartella vuota)";
    return;
  }

  current.children.forEach(item=>{
    let div = document.createElement("div");
    div.className = "item " + item.type + (item.type==="folder"?" folder":"");
    div.textContent = (item.type==="folder"?"📁 ":"📄 ") + item.name;

    div.onclick = ()=>{
      selected = item;
      document.querySelectorAll(".item").forEach(e=>e.classList.remove("selected"));
      div.classList.add("selected");
    };

    div.ondblclick = ()=>{
      if(item.type==="folder"){
        history.push(current);
        current = item;
        selected = null;
        render();
      }
    };

    container.appendChild(div);
  });
}

// Funzioni gestione
function newFolder(){ 
  let name = prompt("Nome cartella:");
  if(!name) return; 
  current.children.push({name,type:"folder",children:[]}); 
  render(); 
}
function newFile(){ 
  let name = prompt("Nome file:");
  if(!name) return; 
  current.children.push({name,type:"file"}); 
  render(); 
}
function renameItem(){ 
  if(!selected) return alert("Seleziona file o cartella"); 
  if(selected.protected) return alert("Protetto!"); 
  let n = prompt("Nuovo nome:",selected.name); 
  if(n) selected.name=n; 
  render(); 
}
function deleteItem(){ 
  if(!selected) return alert("Seleziona file o cartella"); 
  if(selected.protected) return alert("Protetto!"); 
  current.children=current.children.filter(i=>i!==selected); 
  selected=null; 
  render(); 
}
function goBack(){
  if(history.length>0){
    current = history.pop();
    selected = null;
    render();
  } else {
    alert("Sei già alla radice del disco!");
  }
}


  function isProtected(item) {
  // Se l’item stesso è protetto
  if(item.protected) return true;

  // Controlla ricorsivamente se l’item è dentro System
  let parent = current;
  while(parent && parent !== disk){
    if(parent.name === "System" && parent.type==="folder") return true;
    parent = parent.parent; // vedremo dopo come collegare i parent
  }

  return false;
  }

// Torna indietro con Backspace
document.body.onkeydown = e=>{
  if(e.key==="Backspace" && history.length){
    current=history.pop();
    selected=null;
    render();
    e.preventDefault();
  }
};

// Primo render
render();
</script>

</body>
</html>
