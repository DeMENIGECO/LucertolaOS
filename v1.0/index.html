<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>LucertolaOS 1.0</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  margin:0;
  font-family:"Inter", "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #1e3c72, #2a5298);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  color:white;
  text-align:center;
}

/* TITOLO */
h1 {
  margin-top:50px;
  font-size:3rem;
  text-shadow: 0 4px 8px rgba(0,0,0,0.4);
}

/* INTRO */
#intro {
  max-width:700px;
  font-size:1.1rem;
  margin:20px;
  line-height:1.6;
}

/* BUTTON SCARICA */
#downloadBtn {
  margin:30px;
  padding:15px 30px;
  font-size:1.1rem;
  font-weight:600;
  color:white;
  background: #ff6f61;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition: transform 0.2s, box-shadow 0.2s;
}

#downloadBtn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* FOOTER */
footer {
  margin-top:auto;
  margin-bottom:20px;
  font-size:0.85rem;
  opacity:0.7;
}
</style>
</head>
<body>

<h1>LucertolaOS 1.0</h1>

<div id="intro">
  Questa è la <strong>Versione 1.0</strong> di LucertolaOS.<br>
  Include File Explorer, Terminale, Dock e molte app funzionanti.<br>
  Puoi testare il sistema online oppure scaricare l’intero pacchetto ZIP.
</div>

<button id="downloadBtn" onclick="downloadZIP()">⬇ Scarica ZIP</button>

<footer>
  © 2026 LucertolaOS
</footer>

<script>
function downloadZIP(){
  // Il file ZIP deve essere nella stessa cartella di index.html
  window.location.href = 'lucertolaos_1.0_archiv.zip';
}
</script>

</body>
</html>
